services:
  db:
    image: postgres:17-alpine
    ports:
      - 5433:5432
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: nurseschool
    volumes:
      - pgdata:/var/lib/postgresql/data

  admin:
    image: adminer
    ports:
      - 8080:8080

volumes:
  pgdata: